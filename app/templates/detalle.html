<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ producto.nombre }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white">

<div class="container mx-auto px-4 py-12">
    <a href="{{ url_for('inicio') }}"
    class="inline-block mb-8 bg-yellow-500 text-black px-6 py-3 rounded-lg font-bold">
        ← Volver al catálogo
    </a>

    <div class="max-w-5xl mx-auto bg-gray-950 border border-yellow-500 rounded-2xl overflow-hidden">
        <img src="{{ url_for('static', filename=producto.imagen) }}"
            class="w-full h-96 object-cover">

        <div class="p-8">
            <h1 class="text-5xl font-bold text-yellow-400 mb-4">
                {{ producto.nombre }}
            </h1>

            <p class="text-3xl font-bold text-yellow-300 mb-6">
                ${{ "{:,.0f}".format(producto.precio) }}
            </p>

            <p class="text-gray-300 text-lg mb-8">
                {{ producto.descripcion }}
            </p>

            <a href="{{ url_for('agregar_carrito', id=producto.id) }}"
            class="inline-block bg-yellow-500 text-black px-6 py-3 rounded-lg font-bold">
                Agregar al carrito
            </a>
        </div>
    </div>
</div>

</body>
</html>
